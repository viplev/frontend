name: Create Project Issues

# Triggered manually from the Actions tab, OR automatically on the first push
# of this workflow to any branch (runs once; skips if issues already exist).
on:
  push:
    branches:
      - "copilot/plan-project-structure"
    paths:
      - ".github/workflows/create-issues.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run – print issues without creating them"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create labels and issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "🔍 DRY RUN — no issues will actually be created."
            echo "Would run: .github/scripts/create-issues.sh"
            exit 0
          fi

          # Check if issues already exist to avoid duplicates
          EXISTING=$(gh issue list --repo "$REPO" --state all --limit 100 --json number,title | jq length)
          if [[ "$EXISTING" -gt 0 ]]; then
            echo "⚠️  Found $EXISTING existing issue(s). Skipping to prevent duplicates."
            echo "Delete existing issues first if you want to re-create them."
            exit 0
          fi

          bash .github/scripts/create-issues.sh
